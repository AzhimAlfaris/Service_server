services:
  verdant-mysql:
    image: mysql:8.4
    container_name: verdant-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: microcontroller_service_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init/microcontroller_service_db.sql:/docker-entrypoint-initdb.d/01-microcontroller_service_db.sql:ro
    networks:
      - verdant-network
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -proot"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  rabbitmq:
    image: rabbitmq:management
    container_name: verdant-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: user
      RABBITMQ_DEFAULT_PASS: password
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - verdant-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  microcontroller-service:
    build:
      context: ./microcontroller-service
    container_name: microcontroller-service
    restart: unless-stopped
    depends_on:
      verdant-mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      DB_HOST: verdant-mysql
      DB_PORT: 3306
      DB_NAME_MICRO: microcontroller_service_db
      DB_USERNAME: root
      DB_PASSWORD: root
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: user
      RABBITMQ_PASSWORD: password
    ports:
      - "8081:8081"
    networks:
      - verdant-network

  application-service:
    build:
      context: ./application-service
    container_name: application-service
    restart: unless-stopped
    depends_on:
      rabbitmq:
        condition: service_healthy
      microcontroller-service:
        condition: service_started
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: user
      RABBITMQ_PASSWORD: password
      MAIL_HOST: smtp.gmail.com
      MAIL_PORT: 587
      MAIL_USERNAME: anasrudi048@gmail.com
      MAIL_PASSWORD: ISI_PASSWORD_APP_DI_SINI
      MAIL_FROM: anasrudi048@gmail.com
    ports:
      - "8082:8082"
    networks:
      - verdant-network

volumes:
  mysql_data:

networks:
  verdant-network:
    driver: bridge
